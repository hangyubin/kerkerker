# Docker Compose 环境变量配置示例
# 复制此文件为 .env 并填写实际值

# ==================== 应用配置 ====================
# 管理员密码（必填）
ADMIN_PASSWORD=your_secure_password

# MongoDB 连接 URI（Docker 环境使用）
MONGODB_URI=mongodb://mongodb:27017/kerkerker

# MongoDB 数据库名称
MONGODB_DB_NAME=kerkerker

# 豆瓣 API 地址
NEXT_PUBLIC_DOUBAN_API_URL=https://iamyourfather.link0.me

# ==================== 弹幕 API 配置 ====================
# 弹幕 API 地址
NEXT_PUBLIC_DANMU_API_URL=http://192.168.2.253:9321

# 弹幕 API Token
NEXT_PUBLIC_DANMU_API_TOKEN=your_danmu_token
